<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Quartermaster mark (mono)">
  <title>Quartermaster</title>
  <!-- Single-colour, transparent. Recolour by changing the group fill. Master geometry for the set. -->
  <g fill="#26331C">
    <!-- bow = coin with star punched through (evenodd hole) -->
    <path fill-rule="evenodd" d="M176 168 a80 80 0 1 0 160 0 a80 80 0 1 0 -160 0 Z
      M256 126 L266.58 153.44 L295.94 155.02 L273.12 173.56 L280.69 201.98 L256 186 L231.31 201.98 L238.88 173.56 L216.06 155.02 L245.42 153.44 Z"/>
    <!-- throat: tapers from the bow base down to the shank (key neck, not a balloon) -->
    <path d="M230 244 L282 244 L276 266 L236 266 Z"/>
    <!-- shank -->
    <rect x="237" y="258" width="38" height="114" rx="16"/>
    <!-- ascending toothed bit (value climbs to the right) -->
    <path d="M256 348 L372 348 L372 364 L340 364 L340 380 L308 380 L308 396 L274 396 L274 408 L256 408 Z"/>
  </g>
</svg>
