name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level; the Pages-deployment tokens (pages/id-token) are granted
# per-job below, so the build job (which runs third-party mkdocs plugins) never holds id-token.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

# Third-party actions pinned to commit SHAs (comment tracks the version); Dependabot bumps them.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.13"
      - name: Build site (strict -- fails on broken links/orphans)
        run: uv run --extra docs mkdocs build --strict
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
