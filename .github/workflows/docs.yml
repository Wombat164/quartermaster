name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level; the Pages-deployment tokens (pages/id-token) are granted
# per-job below, so the build job (which runs third-party mkdocs plugins) never holds id-token.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

# Third-party actions pinned to commit SHAs (comment tracks the version); Dependabot bumps them.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.13"
      - name: Build site (strict -- fails on broken links/orphans)
        run: uv run --extra docs mkdocs build --strict
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
