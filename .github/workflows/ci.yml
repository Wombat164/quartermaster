name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

# Third-party actions are pinned to commit SHAs (a moving tag could be repointed to malicious code);
# the trailing comment tracks the human-readable version. Dependabot bumps them (.github/dependabot.yml).
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.13"

      - name: Sync (locked -- fails if uv.lock drifted)
        run: uv sync --extra dev --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Bandit (security lint on src)
        run: uv run bandit -q -r src

      - name: pip-audit (dependency CVEs)
        run: uv run pip-audit

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
