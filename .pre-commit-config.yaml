# Pre-commit gate. Pins refreshed via `uv run pre-commit autoupdate`.
# gitleaks is mandatory (plan sec.4: never commit secrets / eBay content / Gixen creds).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.24
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies: []
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
